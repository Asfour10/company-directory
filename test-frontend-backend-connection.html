<!DOCTYPE html>
<html>
<head>
    <title>Frontend-Backend Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        button { padding: 10px 20px; margin: 10px 0; cursor: pointer; }
        .result { margin-top: 20px; padding: 15px; border-radius: 5px; }
        .success { background-color: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .error { background-color: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
        pre { background: #f4f4f4; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Frontend-Backend Connection Test</h1>
    <p>This page tests if the frontend can connect to the backend.</p>
    
    <button onclick="testBackendConnection()">Test Backend Connection</button>
    <button onclick="testLogin()">Test Login</button>
    
    <div id="result"></div>
    
    <script>
        const BACKEND_URL = 'https://company-directory-backend-o3xm.onrender.com';
        
        async function testBackendConnection() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Testing backend connection...</p>';
            
            try {
                const response = await fetch(`${BACKEND_URL}/health`);
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <div class="result success">
                        <h3>✓ Backend is reachable!</h3>
                        <p>Status: ${response.status}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <h3>✗ Cannot reach backend</h3>
                        <p>Error: ${error.message}</p>
                        <p>This might be a CORS issue or the backend is not responding.</p>
                    </div>
                `;
            }
        }
        
        async function testLogin() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Testing login...</p>';
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'admin@company.com',
                        password: 'admin123'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="result success">
                            <h3>✓ Login successful!</h3>
                            <p>Status: ${response.status}</p>
                            <p>User: ${data.user.email}</p>
                            <p>Role: ${data.user.role}</p>
                            <p>Token received: ${data.accessToken ? 'Yes' : 'No'}</p>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="result error">
                            <h3>✗ Login failed</h3>
                            <p>Status: ${response.status}</p>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <h3>✗ Login request failed</h3>
                        <p>Error: ${error.message}</p>
                        <p>This might be a CORS issue or network problem.</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
